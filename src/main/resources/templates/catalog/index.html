<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Catálogo', ~{::content})}">
<body>
<th:block th:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="bi bi-grid-3x3-gap me-2 text-primary"></i>Catálogo de Productos</h3>
    <form action="/catalogo/buscar" method="GET" class="d-flex gap-2">
        <input type="text" name="q" class="form-control form-control-sm"
               placeholder="Buscar producto...">
        <button type="submit" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-search"></i>
        </button>
    </form>
</div>

<!-- Filtros por categoría -->
<div class="mb-3 d-flex gap-2 flex-wrap">
    <a href="/catalogo/"
       th:classappend="${categoriaActiva == null or categoriaActiva.isEmpty()} ? 'btn-primary' : 'btn-outline-secondary'"
       class="btn btn-sm">Todos</a>
    <th:block th:each="cat : ${categorias}">
        <a th:href="@{/catalogo/(categoria=${cat.categoria})}"
           th:classappend="${categoriaActiva == cat.categoria} ? 'btn-primary' : 'btn-outline-secondary'"
           class="btn btn-sm"
           th:text="${cat.categoria}">Categoría</a>
    </th:block>
</div>

<!-- Grilla de productos -->
<div class="row row-cols-1 row-cols-md-3 g-4">
    <th:block th:each="p : ${productos}">
        <div class="col"
             th:if="${categoriaActiva == null or categoriaActiva.isEmpty() or categoriaActiva == p.categoria}">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body">
                    <span class="badge bg-light text-secondary mb-2"
                          th:text="${p.categoria}">Cat</span>
                    <h5 class="card-title" th:text="${p.nombre}">Nombre</h5>
                    <p class="card-text text-muted small" th:text="${p.descripcion}">Desc</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="fs-5 fw-bold text-primary"
                              th:text="${'$' + #numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}">$0</span>
                        <span th:classappend="${p.stock > 10} ? 'bg-success' : (${p.stock > 0} ? 'bg-warning text-dark' : 'bg-danger')"
                              class="badge"
                              th:text="'Stock: ' + ${p.stock}">Stock</span>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 pb-3 px-3">
                    <a th:href="@{/catalogo/producto/{id}(id=${p.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="bi bi-eye me-1"></i>Ver detalle
                    </a>
                </div>
            </div>
        </div>
    </th:block>
</div>

</th:block>
</body>
</html>
