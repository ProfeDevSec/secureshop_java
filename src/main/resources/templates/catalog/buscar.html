<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Búsqueda', ~{::content})}">
<body>
<th:block th:fragment="content">

<a href="/catalogo/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Volver al catálogo
</a>

<h4 th:utext="${mensajeBusqueda}">Resultados para: ...</h4>
<p class="text-muted" th:text="'Se encontraron ' + ${productos.size()} + ' resultado(s).'"></p>

<div th:if="${!productos.isEmpty()}">
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>SKU</th><th>Nombre</th><th>Categoría</th>
                    <th>Precio</th><th>Stock</th><th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td><code class="small" th:text="${p.sku}">SKU</code></td>
                    <td th:text="${p.nombre}">Nombre</td>
                    <td><span class="badge bg-light text-dark"
                              th:text="${p.categoria}">Cat</span></td>
                    <td class="fw-semibold"
                        th:text="${'$' + #numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}">$0</td>
                    <td th:text="${p.stock}">0</td>
                    <td>
                        <a th:href="@{/catalogo/producto/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-primary">Ver</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="alert alert-info" th:if="${productos.isEmpty()}">
    No se encontraron productos que coincidan con la búsqueda.
</div>

</th:block>
</body>
</html>
