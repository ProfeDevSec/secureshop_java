<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Nuevo Pedido', ~{::content})}">
<body>
<th:block th:fragment="content">

<a href="/pedidos/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Volver a pedidos
</a>
<h3 class="mb-4"><i class="bi bi-cart-plus me-2 text-primary"></i>Crear Nuevo Pedido</h3>

<div class="row">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="/pedidos/nuevo">

                    <input type="hidden" name="prefsToken" th:value="${prefsToken}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Producto</label>
                        <select name="productoId" class="form-select" required>
                            <option value="">— Selecciona un producto —</option>
                            <option th:each="p : ${productos}"
                                    th:value="${p.id}"
                                    th:text="${p.nombre} + ' — $' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}">
                                Producto
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Cantidad</label>
                        <input type="number" name="cantidad" class="form-control"
                               min="1" max="100" value="1" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Notas de entrega</label>
                        <textarea name="notas" class="form-control" rows="3"
                                  placeholder="Instrucciones especiales, dirección, etc."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1"></i>Confirmar Pedido
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
