<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Iniciar Sesión', ~{::content})}">
<body>
<th:block th:fragment="content">
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">
                    <i class="bi bi-lock-fill text-primary me-2"></i>Acceso al Portal
                </h4>

                <!-- Error de autenticación -->
                <div class="alert alert-danger" th:if="${error != null}">
                    <span th:text="${error}"></span>
                </div>

                <form method="POST" action="/auth/login" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <input type="text" name="username" class="form-control"
                               required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center text-muted mt-3 small">
            ¿Problemas de acceso? Contacte al administrador.
        </p>
    </div>
</div>
</th:block>
</body>
</html>
