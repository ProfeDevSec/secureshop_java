<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — SecureShop'">SecureShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --ss-primary: #1a3a5c; --ss-accent: #e8850c; }
        .navbar  { background: var(--ss-primary) !important; }
        .navbar-brand span { color: var(--ss-accent); font-weight: 700; }
        .sidebar { background: #f4f6f9; min-height: calc(100vh - 56px); border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 6px; }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active { color: var(--ss-primary); background: #e9ecef; }
        footer   { background: var(--ss-primary); color: #adb5bd; font-size: .85rem; }
        .badge-rol { font-size: .7rem; }
    </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/catalogo">
            <i class="bi bi-shop-window me-1"></i>Secure<span>Shop</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3"
             th:if="${session.username != null}">
            <span class="text-light opacity-75 small">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${session.username}">usuario</span>
                <span class="badge bg-secondary badge-rol ms-1"
                      th:text="${session.rol}">rol</span>
            </span>
            <a href="/auth/logout" class="btn btn-sm btn-outline-light">
                <i class="bi bi-box-arrow-right"></i> Salir
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<nav class="col-md-2 sidebar pt-3 d-none d-md-block"
     th:if="${session.username != null}">
    <ul class="nav flex-column gap-1 px-2">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/catalogo')} ? 'active'"
               href="/catalogo">
                <i class="bi bi-grid-3x3-gap me-2"></i>Catálogo
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${currentUri != null and currentUri.startsWith('/pedidos')} ? 'active'"
               href="/pedidos">
                <i class="bi bi-bag me-2"></i>Mis Pedidos
            </a>
        </li>
        <th:block th:with="rol=${session.rol}"
                  th:if="${rol == 'admin' or rol == 'vendedor' or rol == 'auditor'}">
            <li class="nav-item mt-3">
                <small class="text-muted px-2 text-uppercase fw-semibold"
                       style="font-size:.7rem;">Gestión</small>
            </li>
            <li class="nav-item">
                <a class="nav-link"
                   th:classappend="${currentUri != null and currentUri.startsWith('/reportes')} ? 'active'"
                   href="/reportes">
                    <i class="bi bi-bar-chart me-2"></i>Reportes
                </a>
            </li>
        </th:block>
        <th:block th:if="${session.rol == 'admin'}">
            <li class="nav-item">
                <a class="nav-link"
                   th:classappend="${currentUri != null and currentUri.startsWith('/admin')} ? 'active'"
                   href="/admin">
                    <i class="bi bi-gear me-2"></i>Administración
                </a>
            </li>
        </th:block>
    </ul>
</nav>

<!-- ── Main content ────────────────────────────────────────────────────── -->
<main th:class="${session.username != null} ? 'col-md-10 pt-4 px-4' : 'col-md-12 pt-4 px-4'">

    <!-- Flash success -->
    <div class="alert alert-success alert-dismissible fade show"
         th:if="${exito != null}">
        <span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- Flash error -->
    <div class="alert alert-danger alert-dismissible fade show"
         th:if="${error != null}">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- Flash warning -->
    <div class="alert alert-warning alert-dismissible fade show"
         th:if="${aviso != null}">
        <span th:text="${aviso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Slot de contenido -->
    <th:block th:replace="${content}"/>

</main>
</div>
</div>

<footer class="text-center py-2 mt-5">
    SecureShop Portal Comercial v2.4 &nbsp;|&nbsp; Desarrollado por SecureDevelop &nbsp;|&nbsp;
    <small>Ambiente: <strong>desarrollo</strong></small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
