<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Usuarios', ~{::content})}">
<body>
<th:block th:fragment="content">

<a href="/admin/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Volver al panel
</a>
<h3 class="mb-4"><i class="bi bi-people me-2 text-primary"></i>Usuarios del Sistema</h3>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th>
                    <th>Hash contraseña <small class="text-danger">(MD5)</small></th>
                    <th>Estado</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}"
                    th:classappend="${u.activo == 0} ? 'table-secondary text-muted'">
                    <td th:text="${u.id}">0</td>
                    <td><strong th:text="${u.username}">user</strong></td>
                    <td class="small" th:text="${u.email}">email</td>
                    <td><span class="badge bg-secondary" th:text="${u.rol}">rol</span></td>
                    <td>

                        <code class="small text-danger" style="font-size:.75rem;"
                              th:text="${u.password}">hash</code>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.activo == 1} ? 'bg-success' : 'bg-secondary'"
                              th:text="${u.activo == 1} ? 'Activo' : 'Inactivo'">Estado</span>
                    </td>
                    <td>

                        <form th:action="@{/admin/usuarios/{uid}/toggle(uid=${u.id})}"
                              method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-secondary"
                                    th:text="${u.activo == 1} ? 'Desactivar' : 'Activar'">Toggle</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>
</body>
</html>
