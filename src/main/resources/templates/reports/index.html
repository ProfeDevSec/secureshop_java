<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Reportes', ~{::content})}">
<body>
<th:block th:fragment="content">

<h3 class="mb-4"><i class="bi bi-bar-chart me-2 text-primary"></i>Centro de Reportes</h3>

<div class="row g-3">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center p-4">
                <i class="bi bi-graph-up-arrow fs-1 text-primary mb-3 d-block"></i>
                <h5>Reporte de Ventas</h5>
                <p class="text-muted small">Resumen por cliente y estado de pedidos.</p>
                <a href="/reportes/ventas" class="btn btn-outline-primary btn-sm">Ver reporte</a>
            </div>
        </div>
    </div>

    <th:block th:if="${session.rol == 'admin'}">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center p-4">
                <i class="bi bi-terminal fs-1 text-warning mb-3 d-block"></i>
                <h5>Diagnóstico de Red</h5>
                <p class="text-muted small">Verificación de conectividad a servidores externos.</p>
                <a href="/reportes/diagnostico" class="btn btn-outline-warning btn-sm">Abrir herramienta</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body text-center p-4">
                <i class="bi bi-journal-text fs-1 text-secondary mb-3 d-block"></i>
                <h5>Exportar Logs</h5>
                <p class="text-muted small">Registros de actividad del sistema.</p>
                <a href="/reportes/exportar" class="btn btn-outline-secondary btn-sm">Ver logs</a>
            </div>
        </div>
    </div>
    </th:block>
</div>

</th:block>
</body>
</html>
