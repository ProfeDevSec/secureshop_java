<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Logs del Sistema', ~{::content})}">
<body>
<th:block th:fragment="content">

<a href="/reportes/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Volver a reportes
</a>
<h3 class="mb-4"><i class="bi bi-journal-text me-2 text-secondary"></i>Registros del Sistema</h3>

<div class="card border-0 shadow-sm">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Últimos 200 eventos</span>
        <span class="badge bg-secondary" th:text="${logs.size()} + ' registros'">0 registros</span>
    </div>
    <div class="card-body p-0" style="max-height:500px;overflow-y:auto;">
        <table class="table table-sm table-hover mb-0 align-middle font-monospace"
               style="font-size:.8rem;">
            <thead class="table-dark sticky-top">
                <tr>
                    <th>Fecha</th><th>Nivel</th><th>Usuario</th><th>IP</th><th>Mensaje</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td class="text-muted" th:text="${log.created_at}">fecha</td>
                    <td>
                        <span class="badge"
                              th:classappend="${log.nivel != null and log.nivel.contains('FAIL')} ? 'bg-danger' : (${log.nivel != null and log.nivel.contains('OK')} ? 'bg-success' : 'bg-secondary')"
                              th:text="${log.nivel}">nivel</span>
                    </td>
                    <td th:text="${log.usuario}">user</td>
                    <td th:text="${log.ip}">ip</td>
                    <td th:text="${log.mensaje != null ? log.mensaje : '—'}">—</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>
</body>
</html>
