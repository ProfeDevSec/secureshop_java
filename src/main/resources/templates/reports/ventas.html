<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Ventas', ~{::content})}">
<body>
<th:block th:fragment="content">

<a href="/reportes/" class="btn btn-sm btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Volver a reportes
</a>
<h3 class="mb-4"><i class="bi bi-graph-up-arrow me-2 text-primary"></i>Reporte de Ventas</h3>

<div class="row g-4 mb-4">
    <div class="col-md-4" th:each="r : ${resumen}">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h6 class="text-muted mb-1" th:text="${r.username}">user</h6>
                <div class="fs-4 fw-bold text-primary"
                     th:text="${'$' + #numbers.formatDecimal(r.total_ventas != null ? r.total_ventas : 0, 0, 'COMMA', 0, 'POINT')}">$0</div>
                <small class="text-muted" th:text="${r.total_pedidos} + ' pedido(s)'">0 pedidos</small>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-header bg-light fw-semibold">Detalle de Pedidos Recientes</div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr><th>#</th><th>Cliente</th><th>Estado</th><th>Total</th><th>Fecha</th></tr>
            </thead>
            <tbody>
                <tr th:each="p : ${detalle}">
                    <td><a th:href="@{/pedidos/{id}(id=${p.id})}" th:text="'#' + ${p.id}">#0</a></td>
                    <td th:text="${p.username}">user</td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.estado == 'completado'} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${p.estado}">estado</span>
                    </td>
                    <td th:text="${'$' + #numbers.formatDecimal(p.total, 0, 'COMMA', 0, 'POINT')}">$0</td>
                    <td class="small text-muted" th:text="${p.created_at}">fecha</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>
</body>
</html>
